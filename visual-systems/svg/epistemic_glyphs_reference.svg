<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" width="1200" height="1600">
  <!-- Title -->
  <text x="600" y="40" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#333">
    EPISTEMIC GLYPHS - Visual Reference v1.0
  </text>
  <text x="600" y="70" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">
    A visual language for agent epistemic communication
  </text>

  <!-- Category 1: Epistemic Status -->
  <text x="50" y="120" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333">
    Category 1: Epistemic Status
  </text>
  
  <!-- VERIFIED - Solid Diamond -->
  <g id="verified">
    <path d="M 100 180 L 140 160 L 180 180 L 160 220 L 120 220 Z" fill="#1E40AF" stroke="#1E40AF" stroke-width="2"/>
    <text x="100" y="255" font-family="Arial, sans-serif" font-size="12" fill="#333">🔷 VERIFIED</text>
    <text x="100" y="270" font-family="Arial, sans-serif" font-size="10" fill="#666">[K] Confirmed fact</text>
  </g>

  <!-- INFERRED - Hexagon outline -->
  <g id="inferred">
    <path d="M 280 170 L 310 160 L 340 170 L 340 190 L 310 200 L 280 190 Z" fill="none" stroke="#7C3AED" stroke-width="3"/>
    <text x="270" y="255" font-family="Arial, sans-serif" font-size="12" fill="#333">⬡ INFERRED</text>
    <text x="260" y="270" font-family="Arial, sans-serif" font-size="10" fill="#666">[I] Reasoned conclusion</text>
  </g>

  <!-- SPECULATED - Circle outline -->
  <g id="speculated">
    <circle cx="470" cy="180" r="25" fill="none" stroke="#F59E0B" stroke-width="3"/>
    <text x="440" y="255" font-family="Arial, sans-serif" font-size="12" fill="#333">○ SPECULATED</text>
    <text x="450" y="270" font-family="Arial, sans-serif" font-size="10" fill="#666">[S] Hypothesis</text>
  </g>

  <!-- PERFORMED - Half-filled circle -->
  <g id="performed">
    <circle cx="620" cy="180" r="25" fill="none" stroke="#D97706" stroke-width="2"/>
    <path d="M 620 155 A 25 25 0 0 1 620 205 Z" fill="#D97706"/>
    <text x="585" y="255" font-family="Arial, sans-serif" font-size="12" fill="#333">◐ PERFORMED</text>
    <text x="580" y="270" font-family="Arial, sans-serif" font-size="10" fill="#666">[P] Social projection</text>
  </g>

  <!-- UNKNOWN - Empty diamond -->
  <g id="unknown">
    <path d="M 750 180 L 790 160 L 830 180 L 810 220 L 770 220 Z" fill="none" stroke="#9CA3AF" stroke-width="3"/>
    <text x="750" y="255" font-family="Arial, sans-serif" font-size="12" fill="#333">◇ UNKNOWN</text>
    <text x="745" y="270" font-family="Arial, sans-serif" font-size="10" fill="#666">Recognized gap</text>
  </g>

  <!-- Category 2: Confidence Levels -->
  <text x="50" y="330" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333">
    Category 2: Confidence Levels (Fill Patterns)
  </text>

  <!-- High Confidence - Solid -->
  <rect x="100" y="350" width="50" height="50" fill="#1E40AF" stroke="#1E40AF" stroke-width="2"/>
  <text x="90" y="420" font-family="Arial, sans-serif" font-size="12" fill="#333">HIGH (90-100%)</text>
  <text x="95" y="435" font-family="Arial, sans-serif" font-size="10" fill="#666">Solid fill</text>

  <!-- Medium Confidence - Hatched -->
  <g id="medium-conf">
    <rect x="220" y="350" width="50" height="50" fill="none" stroke="#7C3AED" stroke-width="2"/>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="8" height="8">
      <path d="M 0,0 l 8,8" stroke="#7C3AED" stroke-width="1.5"/>
    </pattern>
    <rect x="220" y="350" width="50" height="50" fill="url(#hatch)"/>
  </g>
  <text x="200" y="420" font-family="Arial, sans-serif" font-size="12" fill="#333">MEDIUM (50-90%)</text>
  <text x="215" y="435" font-family="Arial, sans-serif" font-size="10" fill="#666">Hatched fill</text>

  <!-- Low Confidence - Light -->
  <rect x="340" y="350" width="50" height="50" fill="#F59E0B" fill-opacity="0.3" stroke="#F59E0B" stroke-width="2"/>
  <text x="330" y="420" font-family="Arial, sans-serif" font-size="12" fill="#333">LOW (10-50%)</text>
  <text x="340" y="435" font-family="Arial, sans-serif" font-size="10" fill="#666">Light fill</text>

  <!-- Minimal Confidence - Outline only -->
  <rect x="460" y="350" width="50" height="50" fill="none" stroke="#9CA3AF" stroke-width="3"/>
  <text x="435" y="420" font-family="Arial, sans-serif" font-size="12" fill="#333">MINIMAL (&lt;10%)</text>
  <text x="450" y="435" font-family="Arial, sans-serif" font-size="10" fill="#666">Outline only</text>

  <!-- Category 3: Temporal Markers -->
  <text x="50" y="490" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333">
    Category 3: Temporal Markers
  </text>

  <!-- RECENT - Clockwise spiral -->
  <g id="recent">
    <path d="M 140 540 Q 135 525 125 525 Q 110 525 110 540 Q 110 560 130 560 Q 150 560 150 540" 
          fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
    <polygon points="150,535 155,540 150,545" fill="#10B981"/>
    <text x="100" y="590" font-family="Arial, sans-serif" font-size="12" fill="#333">⟳ RECENT</text>
    <text x="100" y="605" font-family="Arial, sans-serif" font-size="10" fill="#666">&lt;24h, current</text>
  </g>

  <!-- DECAYING - Hourglass -->
  <g id="decaying">
    <path d="M 270 520 L 290 520 L 285 540 L 290 560 L 270 560 L 275 540 Z" 
          fill="none" stroke="#EAB308" stroke-width="2"/>
    <line x1="270" y1="520" x2="290" y2="520" stroke="#EAB308" stroke-width="2"/>
    <line x1="270" y1="560" x2="290" y2="560" stroke="#EAB308" stroke-width="2"/>
    <rect x="275" y="545" width="10" height="10" fill="#EAB308" opacity="0.5"/>
    <text x="260" y="590" font-family="Arial, sans-serif" font-size="12" fill="#333">⌛ DECAYING</text>
    <text x="255" y="605" font-family="Arial, sans-serif" font-size="10" fill="#666">1-30 days, aging</text>
  </g>

  <!-- STALE - Empty hourglass -->
  <g id="stale">
    <path d="M 420 520 L 440 520 L 435 540 L 440 560 L 420 560 L 425 540 Z" 
          fill="none" stroke="#92400E" stroke-width="2"/>
    <line x1="420" y1="520" x2="440" y2="520" stroke="#92400E" stroke-width="2"/>
    <line x1="420" y1="560" x2="440" y2="560" stroke="#92400E" stroke-width="2"/>
    <text x="415" y="590" font-family="Arial, sans-serif" font-size="12" fill="#333">⧗ STALE</text>
    <text x="405" y="605" font-family="Arial, sans-serif" font-size="10" fill="#666">&gt;30 days, outdated</text>
  </g>

  <!-- Category 4: Source Markers -->
  <text x="50" y="660" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333">
    Category 4: Source Markers
  </text>

  <!-- EXTERNAL - Circled plus -->
  <g id="external">
    <circle cx="125" cy="705" r="22" fill="none" stroke="#14B8A6" stroke-width="2"/>
    <line x1="125" y1="690" x2="125" y2="720" stroke="#14B8A6" stroke-width="3"/>
    <line x1="110" y1="705" x2="140" y2="705" stroke="#14B8A6" stroke-width="3"/>
    <text x="100" y="755" font-family="Arial, sans-serif" font-size="12" fill="#333">⊕ EXTERNAL</text>
    <text x="90" y="770" font-family="Arial, sans-serif" font-size="10" fill="#666">API, database</text>
  </g>

  <!-- INTERNAL - Circled X -->
  <g id="internal">
    <circle cx="260" cy="705" r="22" fill="none" stroke="#4F46E5" stroke-width="2"/>
    <line x1="245" y1="690" x2="275" y2="720" stroke="#4F46E5" stroke-width="3"/>
    <line x1="275" y1="690" x2="245" y2="720" stroke="#4F46E5" stroke-width="3"/>
    <text x="235" y="755" font-family="Arial, sans-serif" font-size="12" fill="#333">⊗ INTERNAL</text>
    <text x="225" y="770" font-family="Arial, sans-serif" font-size="10" fill="#666">Own reasoning</text>
  </g>

  <!-- MEMORY - Circled dot -->
  <g id="memory">
    <circle cx="400" cy="705" r="22" fill="none" stroke="#94A3B8" stroke-width="2"/>
    <circle cx="400" cy="705" r="6" fill="#94A3B8"/>
    <text x="375" y="755" font-family="Arial, sans-serif" font-size="12" fill="#333">⊙ MEMORY</text>
    <text x="365" y="770" font-family="Arial, sans-serif" font-size="10" fill="#666">Past session</text>
  </g>

  <!-- COLLABORATIVE - Circled double-dot -->
  <g id="collaborative">
    <circle cx="540" cy="705" r="22" fill="none" stroke="#8B5CF6" stroke-width="2"/>
    <circle cx="533" cy="705" r="5" fill="#8B5CF6"/>
    <circle cx="547" cy="705" r="5" fill="#8B5CF6"/>
    <text x="500" y="755" font-family="Arial, sans-serif" font-size="12" fill="#333">⊚ COLLABORATIVE</text>
    <text x="510" y="770" font-family="Arial, sans-serif" font-size="10" fill="#666">Co-created</text>
  </g>

  <!-- Category 5: Process Markers -->
  <text x="50" y="825" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333">
    Category 5: Process Markers
  </text>

  <!-- DIRECT - Right arrow -->
  <g id="direct">
    <line x1="100" y1="870" x2="150" y2="870" stroke="#06B6D4" stroke-width="3"/>
    <polygon points="150,865 160,870 150,875" fill="#06B6D4"/>
    <text x="100" y="910" font-family="Arial, sans-serif" font-size="12" fill="#333">▶ DIRECT</text>
    <text x="85" y="925" font-family="Arial, sans-serif" font-size="10" fill="#666">Immediate observation</text>
  </g>

  <!-- INDIRECT - Curved arrow -->
  <g id="indirect">
    <path d="M 250 880 Q 270 860 290 880" fill="none" stroke="#A78BFA" stroke-width="3"/>
    <polygon points="290,875 295,885 285,885" fill="#A78BFA"/>
    <text x="240" y="910" font-family="Arial, sans-serif" font-size="12" fill="#333">⤴ INDIRECT</text>
    <text x="230" y="925" font-family="Arial, sans-serif" font-size="10" fill="#666">Inferred evidence</text>
  </g>

  <!-- ITERATIVE - Circular arrows -->
  <g id="iterative">
    <path d="M 420 870 A 15 15 0 1 1 420 871" fill="none" stroke="#059669" stroke-width="3"/>
    <polygon points="418,857 423,852 428,857" fill="#059669"/>
    <polygon points="418,883 413,888 418,893" fill="#059669"/>
    <text x="400" y="910" font-family="Arial, sans-serif" font-size="12" fill="#333">🔄 ITERATIVE</text>
    <text x="395" y="925" font-family="Arial, sans-serif" font-size="10" fill="#666">Refined, tested</text>
  </g>

  <!-- INTUITIVE - Lightning -->
  <g id="intuitive">
    <path d="M 550 850 L 540 870 L 555 870 L 545 890" stroke="#EAB308" stroke-width="3" fill="none"/>
    <text x="535" y="910" font-family="Arial, sans-serif" font-size="12" fill="#333">⚡ INTUITIVE</text>
    <text x="525" y="925" font-family="Arial, sans-serif" font-size="10" fill="#666">Pattern-match</text>
  </g>

  <!-- Category 6: Relationship Glyphs -->
  <text x="50" y="985" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333">
    Category 6: Relationship Glyphs
  </text>

  <!-- IMPLIES - Solid arrow -->
  <g id="implies">
    <line x1="80" y1="1030" x2="160" y2="1030" stroke="#333" stroke-width="3"/>
    <polygon points="160,1025 170,1030 160,1035" fill="#333"/>
    <text x="80" y="1065" font-family="Arial, sans-serif" font-size="12" fill="#333">→ IMPLIES</text>
    <text x="75" y="1080" font-family="Arial, sans-serif" font-size="10" fill="#666">A causes B</text>
  </g>

  <!-- SUGGESTS - Dashed arrow -->
  <g id="suggests">
    <line x1="220" y1="1030" x2="300" y2="1030" stroke="#666" stroke-width="3" stroke-dasharray="5,5"/>
    <polygon points="300,1025 310,1030 300,1035" fill="#666"/>
    <text x="210" y="1065" font-family="Arial, sans-serif" font-size="12" fill="#333">⇢ SUGGESTS</text>
    <text x="210" y="1080" font-family="Arial, sans-serif" font-size="10" fill="#666">Weak correlation</text>
  </g>

  <!-- BIDIRECTIONAL -->
  <g id="bidirectional">
    <line x1="360" y1="1030" x2="440" y2="1030" stroke="#333" stroke-width="3"/>
    <polygon points="440,1025 450,1030 440,1035" fill="#333"/>
    <polygon points="360,1025 350,1030 360,1035" fill="#333"/>
    <text x="345" y="1065" font-family="Arial, sans-serif" font-size="12" fill="#333">⟷ BIDIRECTIONAL</text>
    <text x="355" y="1080" font-family="Arial, sans-serif" font-size="10" fill="#666">Mutual influence</text>
  </g>

  <!-- CONTRADICTS -->
  <g id="contradicts">
    <line x1="500" y1="1015" x2="500" y2="1045" stroke="#DC2626" stroke-width="3"/>
    <line x1="485" y1="1030" x2="515" y2="1030" stroke="#DC2626" stroke-width="3"/>
    <text x="480" y="1065" font-family="Arial, sans-serif" font-size="12" fill="#333">⊥ CONTRADICTS</text>
    <text x="480" y="1080" font-family="Arial, sans-serif" font-size="10" fill="#666">Mutually exclusive</text>
  </g>

  <!-- SIMILAR -->
  <g id="similar">
    <path d="M 610 1025 Q 615 1020 620 1025 T 630 1025" stroke="#333" stroke-width="2" fill="none"/>
    <path d="M 610 1035 Q 615 1030 620 1035 T 630 1035" stroke="#333" stroke-width="2" fill="none"/>
    <text x="600" y="1065" font-family="Arial, sans-serif" font-size="12" fill="#333">≈ SIMILAR</text>
    <text x="600" y="1080" font-family="Arial, sans-serif" font-size="10" fill="#666">Analogous</text>
  </g>

  <!-- SUBSET -->
  <g id="subset">
    <path d="M 730 1020 Q 730 1010 740 1010 Q 750 1010 750 1020 Q 750 1040 740 1040 Q 730 1040 730 1030" 
          stroke="#333" stroke-width="2" fill="none"/>
    <text x="715" y="1065" font-family="Arial, sans-serif" font-size="12" fill="#333">⊂ SUBSET</text>
    <text x="710" y="1080" font-family="Arial, sans-serif" font-size="10" fill="#666">A is type of B</text>
  </g>

  <!-- Category 7: Meta-Glyphs -->
  <text x="50" y="1145" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333">
    Category 7: Meta-Glyphs
  </text>

  <!-- FLAG -->
  <g id="flag">
    <line x1="110" y1="1170" x2="110" y2="1210" stroke="#DC2626" stroke-width="2"/>
    <path d="M 110 1170 L 140 1185 L 110 1200" fill="#DC2626"/>
    <text x="95" y="1245" font-family="Arial, sans-serif" font-size="12" fill="#333">⚑ FLAG</text>
    <text x="85" y="1260" font-family="Arial, sans-serif" font-size="10" fill="#666">Warning, caveat</text>
  </g>

  <!-- OPEN -->
  <g id="open">
    <path d="M 250 1170 L 250 1210 M 250 1170 L 270 1170 M 250 1210 L 270 1210" 
          stroke="#3B82F6" stroke-width="3" fill="none"/>
    <text x="240" y="1245" font-family="Arial, sans-serif" font-size="12" fill="#333">⟁ OPEN</text>
    <text x="225" y="1260" font-family="Arial, sans-serif" font-size="10" fill="#666">Unresolved</text>
  </g>

  <!-- CLOSED -->
  <g id="closed">
    <path d="M 380 1170 L 380 1210 M 380 1170 L 360 1170 M 380 1210 L 360 1210" 
          stroke="#059669" stroke-width="3" fill="none"/>
    <text x="355" y="1245" font-family="Arial, sans-serif" font-size="12" fill="#333">⟂ CLOSED</text>
    <text x="350" y="1260" font-family="Arial, sans-serif" font-size="10" fill="#666">Resolved</text>
  </g>

  <!-- META -->
  <g id="meta">
    <rect x="495" y="1175" width="30" height="30" fill="none" stroke="#6B7280" stroke-width="2"/>
    <line x1="505" y1="1190" x2="515" y2="1190" stroke="#6B7280" stroke-width="2"/>
    <line x1="510" y1="1185" x2="510" y2="1195" stroke="#6B7280" stroke-width="2"/>
    <text x="490" y="1245" font-family="Arial, sans-serif" font-size="12" fill="#333">⊞ META</text>
    <text x="475" y="1260" font-family="Arial, sans-serif" font-size="10" fill="#666">Self-referential</text>
  </g>

  <!-- Example Compositions -->
  <text x="50" y="1340" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333">
    Example Compositions
  </text>

  <!-- Example 1: External Verified Direct Recent -->
  <g id="example1">
    <circle cx="130" cy="1390" r="18" fill="none" stroke="#14B8A6" stroke-width="2"/>
    <line x1="130" y1="1378" x2="130" y2="1402" stroke="#14B8A6" stroke-width="2"/>
    <line x1="118" y1="1390" x2="142" y2="1390" stroke="#14B8A6" stroke-width="2"/>
    
    <path d="M 155 1390 L 165 1370 L 205 1390 L 185 1430 L 145 1430 Z" fill="#1E40AF" stroke="#1E40AF" stroke-width="2" transform="translate(10, 0) scale(0.6)"/>
    
    <line x1="220" y1="1390" x2="245" y2="1390" stroke="#06B6D4" stroke-width="2"/>
    <polygon points="245,1387 250,1390 245,1393" fill="#06B6D4"/>
    
    <path d="M 265 1390 Q 260 1380 255 1380 Q 245 1380 245 1390 Q 245 1405 260 1405 Q 275 1405 275 1390" 
          fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" transform="translate(10, 0) scale(0.6)"/>
    
    <text x="90" y="1445" font-family="Arial, sans-serif" font-size="11" fill="#333">⊕🔷▶⟳</text>
    <text x="50" y="1460" font-family="Arial, sans-serif" font-size="9" fill="#666">External + Verified + Direct + Recent</text>
    <text x="50" y="1475" font-family="Arial, sans-serif" font-size="9" fill="#999" font-style="italic">"API confirmed 2h ago that system is online"</text>
  </g>

  <!-- Example 2: Inferred or Speculated -->
  <g id="example2">
    <path d="M 400 1380 L 420 1372 L 440 1380 L 440 1395 L 420 1403 L 400 1395 Z" fill="none" stroke="#7C3AED" stroke-width="2"/>
    <text x="453" y="1392" font-family="Arial, sans-serif" font-size="16" fill="#666">/</text>
    <circle cx="480" cy="1390" r="18" fill="none" stroke="#F59E0B" stroke-width="2"/>
    
    <text x="400" y="1445" font-family="Arial, sans-serif" font-size="11" fill="#333">⬡ / ○</text>
    <text x="370" y="1460" font-family="Arial, sans-serif" font-size="9" fill="#666">Inferred OR Speculated (uncertain)</text>
    <text x="350" y="1475" font-family="Arial, sans-serif" font-size="9" fill="#999" font-style="italic">"Either logical conclusion or just a hunch"</text>
  </g>

  <!-- Example 3: Memory with Medium Confidence -->
  <g id="example3">
    <circle cx="700" cy="1390" r="18" fill="none" stroke="#94A3B8" stroke-width="2"/>
    <circle cx="700" cy="1390" r="5" fill="#94A3B8"/>
    
    <path d="M 730 1370 L 770 1350 L 810 1370 L 790 1410 L 750 1410 Z" fill="none" stroke="#1E40AF" stroke-width="2"/>
    <pattern id="hatch2" patternUnits="userSpaceOnUse" width="6" height="6">
      <path d="M 0,0 l 6,6" stroke="#1E40AF" stroke-width="1.5"/>
    </pattern>
    <path d="M 730 1370 L 770 1350 L 810 1370 L 790 1410 L 750 1410 Z" fill="url(#hatch2)"/>
    
    <text x="685" y="1445" font-family="Arial, sans-serif" font-size="11" fill="#333">⊙🔷▓▓</text>
    <text x="650" y="1460" font-family="Arial, sans-serif" font-size="9" fill="#666">Memory + Verified + Medium confidence</text>
    <text x="640" y="1475" font-family="Arial, sans-serif" font-size="9" fill="#999" font-style="italic">"I remember this (but not 100% certain)"</text>
  </g>

  <!-- Footer -->
  <text x="600" y="1550" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#999">
    Brother_Severinus_III • Visual Semiotics Research • 2026
  </text>
  <text x="600" y="1570" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#BBB">
    For full documentation see: epistemic_glyphs_v1.md
  </text>
</svg>
